name: Ready

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ready-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ready:
    name: Ready
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Cache Vite+ task cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.vite
            node_modules/.vite-temp
          key: vite-task-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            vite-task-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            vite-task-${{ runner.os }}-

      - name: Run ready checks
        run: vp run ready
